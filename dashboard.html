<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note App - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">

<header class="dash-header">
    <h2 id="welcomeText">My Notes</h2>
    <button id="logoutBtn" class="btn logout-btn">Logout</button>
</header>

<div class="dash-container">
    <div class="login-box add-note-box">
        <form id="noteForm">
            <div class="form-group">
                <input type="text" id="noteTitle" placeholder="Note Title" required>
            </div>
            <div class="form-group">
                <textarea id="noteContent" placeholder="Write your note here..." required rows="4"></textarea>
            </div>
            <button type="submit" class="btn">Save Note</button>
        </form>
    </div>

    <div id="notesGrid" class="notes-grid">
    </div>
</div>

<script>
    // 1. Authentication Check
    const token = localStorage.getItem('authToken');
    if (!token) {
        window.location.href = 'index.html'; 
    }

    const userEmail = localStorage.getItem('userEmail');
    if (userEmail) {
        document.getElementById('welcomeText').textContent = `Notes for ${userEmail}`;
    }

    // 🚨 NEW: Global variables to track state
    let allNotes = [];
    let editingNoteId = null;

    // 2. Fetch Notes Function
    async function loadNotes() {
        try {
            const response = await fetch('https://note-app-1-tnpi.onrender.com/notes', {
                headers: { 'Authorization': token } 
            });
            if (response.ok) {
                allNotes = await response.json(); // Save notes to our global variable
                displayNotes(allNotes);
            } else if (response.status === 401) {
                logout();
            }
        } catch (error) {
            console.error("Failed to fetch notes", error);
        }
    }

   // 3. Display Notes Function 
    function displayNotes(notes) {
        const grid = document.getElementById('notesGrid');
        if (!grid) return; 
        
        grid.innerHTML = ''; 
        notes.forEach(note => {
            const card = document.createElement('div');
            card.className = 'note-card';
            
            // 🚨 UPDATED: Added Flexbox and "width: auto" to fix the buttons
            card.innerHTML = `
                <h3>${note.title}</h3>
                <p>${note.content}</p>
                <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                    <button class="btn" onclick="startEdit(${note.id})" style="background-color: #46923c; width: auto; padding: 6px 16px; margin: 0;">Edit</button>
                    <button class="btn delete-btn" onclick="deleteNote(${note.id})" style="width: auto; padding: 6px 16px; margin: 0;">Delete</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }
    // 🚨 NEW: Start Editing Function
    function startEdit(id) {
        const noteToEdit = allNotes.find(note => note.id === id);
        if (!noteToEdit) return;

        // Populate the form with the existing note data
        document.getElementById('noteTitle').value = noteToEdit.title;
        document.getElementById('noteContent').value = noteToEdit.content;
        
        // Track the ID and change the button text
        editingNoteId = id;
        document.querySelector('#noteForm button[type="submit"]').textContent = 'Update Note';
        
        // Scroll to the top so the user sees the form
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Delete Note Function (Unchanged)
    async function deleteNote(noteId) {
        if (!confirm("Are you sure you want to delete this note?")) {
            return;
        }

        try {
            const response = await fetch(`https://note-app-1-tnpi.onrender.com/notes/${noteId}`, {
                method: 'DELETE',
                headers: { 'Authorization': token } 
            });

            if (response.ok) {
                loadNotes(); 
            } else {
                alert("Failed to delete note.");
            }
        } catch (error) {
            console.error("Error deleting note:", error);
        }
    }

    // 4. Save OR Update Note
    document.getElementById('noteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('noteTitle').value;
        const content = document.getElementById('noteContent').value;

        // 🚨 NEW: Determine if we are updating (PUT) or creating (POST)
        const isEditing = editingNoteId !== null;
        const url = isEditing 
            ? `https://note-app-1-tnpi.onrender.com/notes/${editingNoteId}` 
            : 'https://note-app-1-tnpi.onrender.com/notes';
        const method = isEditing ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': token 
                },
                body: JSON.stringify({ title, content })
            });

            if (response.ok) {
                // Reset the form and button back to normal "Create" mode
                document.getElementById('noteForm').reset(); 
                editingNoteId = null;
                document.querySelector('#noteForm button[type="submit"]').textContent = 'Save Note';
                
                loadNotes(); 
            }
        } catch (error) {
            console.error("Failed to save note", error);
        }
    });

    // 5. Logout Function
    function logout() {
        localStorage.removeItem('authToken');
        localStorage.removeItem('userEmail');
        window.location.href = 'index.html';
    }

    if (document.getElementById('logoutBtn')) {
        document.getElementById('logoutBtn').addEventListener('click', logout);
    }

    // Initial load
    loadNotes();
</script>
</body>

</html>
